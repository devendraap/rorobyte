
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Page Report</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --code-bg: #161b22;
        }

        /* Remove all surrounding white areas/margins */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden; /* Prevent horizontal scroll on the body */
        }

        /* The container takes full width and fills the screen */
        #report-container {
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
            padding: 0px; /* Internal spacing so text isn't touching the screen edge */
            /* Forces long words/URLs to break and wrap */
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
        }

        /* Status indicator - floating in the top right corner */
        #status {
            position: fixed;
            bottom: 0px;
            right: 20px;
            font-size: 0.3rem;
            color: var(--text-secondary);
            background: rgba(13, 17, 23, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
            pointer-events: none;
            font-family: monospace;
            z-index: 100;
        }

        /* Markdown Styling */
        #report-container h1, #report-container h2 { 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 0.3em; 
        }
        #report-container code { 
            background: var(--code-bg); 
            /*padding: 0.2em 0.4em; */
            border-radius: 6px;
            font-size: 90%;
            word-break: break-all; /* Ensures inline code doesn't overflow */
        }
        #report-container pre { 
            background: var(--code-bg); 
            /*padding: 16px;*/
            border-radius: 8px;
            border: 1px solid var(--border-color);
            /* Force code blocks to wrap instead of scrolling */
            white-space: pre-wrap;       /* CSS3 */
            white-space: -moz-pre-wrap;  /* Firefox */
            white-space: -pre-wrap;      /* Opera 4-6 */
            white-space: -o-pre-wrap;    /* Opera 7 */
            word-wrap: break-word;       /* Internet Explorer 5.5+ */
        }

        #report-container img {
            max-width: 100%;
            height: auto;
        }

        #report-container table {
            border-collapse: collapse;
            width: 100%;
            display: block; /* Allows table to be scrollable if it absolutely cannot wrap */
            overflow-x: auto;
        }

        #report-container th, #report-container td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            min-width: 100px;
        }

        .loading {
            display: flex;
            justify-content: center;
            padding-top: 50px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div id="status">Connecting...</div>
    <div id="report-container">
        <div class="loading">Initializing Full Page Stream...</div>
    </div>

    <script>
        const API_URL = 'https://iview.rorobyte.com/api/v1/get_algo_ans';
        const container = document.getElementById('report-container');
        const statusEl = document.getElementById('status');
        
        let lastContent = "";

        async function fetchReport() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const markdown = data.result?.report || "# No Report Data Found";

                if (markdown !== lastContent) {
                    // Update only on change
                    container.innerHTML = marked.parse(markdown);
                    lastContent = markdown;
                    statusEl.innerText = "LIVE • " + new Date().toLocaleTimeString();
                } else {
                    statusEl.innerText = "" + new Date().toLocaleTimeString();
                }
            } catch (err) {
                statusEl.innerHTML = `<span style="color: #ff7b72">Connection Error</span>`;
                console.error("Poll Error:", err);
            }
        }

        // Run immediately
        fetchReport();

        // Refresh every 10 seconds
        setInterval(fetchReport, 10000);
    </script>
</body>
</html>
